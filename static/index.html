<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mundial 2026 - Simulador</title>

  <style>
    :root{
      color-scheme: dark;
      --bg:#03162f;
      --bg-deep:#051124;
      --bg-soft:#0b2f57;
      --card:#082241;
      --card-2:#061a34;
      --card-3:#091b31;
      --text:#f4f7fb;
      --muted:#b8c7dc;
      --border:rgba(255,214,64,.18);
      --accent:#f3c623;
      --accent-soft:#d8a91a;
      --accent-deep:#c38a05;
      --accent-pale:#f2d56b;
      --ink:#08264d;
      --koPanel:linear-gradient(180deg, rgba(9,27,49,.98), rgba(6,18,36,.98));
      --koMatchH:64px;
      --koRoundW:110px;
      --shadow:0 14px 34px rgba(0,0,0,.36);
      --safe-top:env(safe-area-inset-top, 0px);
      /** Altura aproximada de la fila de pestañas (para apilar barra simular KO debajo) */
      --tabs-bar-h:56px;
      /** Altura de la tarjeta sticky "Simular todo" (padding + botón) */
      --ko-sim-toolbar-h:0px;
/** Los "Simular" del bracket quedan fijos solo debajo de pestañas */
--bracket-sim-sticky-top: calc(var(--safe-top) + 6px + var(--tabs-bar-h) + 8px);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,sans-serif;
      background:
        radial-gradient(circle at 0% 0%, rgba(243,198,35,.10), transparent 18%),
        radial-gradient(circle at 100% 0%, rgba(11,47,87,.60), transparent 28%),
        radial-gradient(circle at 20% 20%, rgba(13,69,128,.30), transparent 40%),
        linear-gradient(180deg, #041730 0%, #062247 48%, #03162f 100%);
      color:var(--text);
      overflow-x:hidden;
      padding-bottom:40px;
    }
    body.admob-banner-active{
      padding-bottom:120px;
    }
    .wrap{
      max-width:1220px;
      margin:0 auto;
      padding:calc(env(safe-area-inset-top, 0px) + 14px) 16px 24px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .app-topbar{
      position:relative;
      z-index:1;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-radius:16px;
      border:1px solid rgba(255,214,64,.16);
      background:linear-gradient(180deg, rgba(8,34,65,.97), rgba(5,18,35,.98));
      box-shadow:0 12px 24px rgba(0,0,0,.22);
      backdrop-filter:blur(8px);
    }
    .app-title{
      margin:0;
      font-size:15px;
      font-weight:900;
      letter-spacing:.3px;
      color:#f7fbff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .pill{
      font-size:12px;
      color:var(--ink);
      background:linear-gradient(180deg,var(--accent-pale),var(--accent));
      padding:6px 12px;
      border-radius:999px;
      border:1px solid rgba(255,214,64,.45);
      font-weight:700;
      box-shadow:0 8px 18px rgba(0,0,0,.18);
    }

.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:0 0 10px;
  padding:6px;
  border-radius:16px;
  background:linear-gradient(180deg, rgba(2,12,25,.72), rgba(7,24,44,.86));
  border:1px solid rgba(255,214,64,.12);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 8px 18px rgba(0,0,0,.14);
  position:sticky;
  top:calc(var(--safe-top) + 6px);
  z-index:18;
}
.tabbtn{
  border:1px solid transparent;
  background:transparent;
  color:#c8d6ea;
  padding:12px 18px;
  border-radius:13px;
  cursor:pointer;
  font-weight:900;
  flex:1;
  text-align:center;
  min-height:44px;
  transition:all .18s ease;
}
.tabbtn:hover{
  transform:translateY(-1px);
  color:#edf4ff;
  background:rgba(255,255,255,.04);
}
.tabbtn[aria-selected="true"]{
  border-color:rgba(255,214,64,.55);
  color:var(--ink);
  background:linear-gradient(180deg, #f6d56b 0%, #e8b722 100%);
  box-shadow:0 10px 20px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.35);
}

    .card{
      border:1px solid rgba(255,214,64,.14);
      background:linear-gradient(180deg, rgba(8,34,65,.96), rgba(6,21,40,.98));
      border-radius:18px;
      padding:16px;
      margin-bottom:18px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }
    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(243,198,35,.05), transparent 32%, rgba(9,47,86,.08) 78%, transparent 100%);
      pointer-events:none;
    }
    #view-groups .card{
      border-radius:20px;
      box-shadow:0 16px 30px rgba(0,0,0,.22);
    }
    .groupbar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:0 0 14px;
      padding-bottom:14px;
      border-bottom:1px solid rgba(255,214,64,.12);
      position:relative;
      z-index:1;
    }
    .gbtn{
      width:42px;
      height:38px;
      border:1px solid rgba(255,214,64,.26);
      border-radius:12px;
      background:linear-gradient(180deg, rgba(7,22,42,.98), rgba(5,16,30,.98));
      color:var(--text);
      cursor:pointer;
      font-weight:800;
      transition:all .18s ease;
      box-shadow:0 10px 18px rgba(0,0,0,.18);
    }
    .gbtn:hover{border-color:rgba(255,214,64,.52);transform:translateY(-1px);}
    .gbtn[aria-selected="true"]{
      background:linear-gradient(180deg, #f8d65e 0%, #efbd1b 100%);
      color:var(--ink);
      border-color:rgba(255,214,64,.86);
      box-shadow:0 12px 20px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.4);
    }
    .group-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      margin:0 0 14px;
      position:relative;
      z-index:1;
      padding:10px;
      border-radius:14px;
      background:linear-gradient(180deg, rgba(7,23,42,.72), rgba(5,17,32,.84));
      border:1px solid rgba(255,214,64,.10);
    }
    .group-actions .button{
      min-height:46px;
      padding:11px 16px;
    }

    .button{
  background:linear-gradient(180deg, #f7d66f 0%, #e8b621 100%);
  color:var(--ink);
  border:1px solid rgba(255,214,64,.72);
  border-radius:14px;
  padding:10px 16px;
  font-weight:900;
  letter-spacing:.3px;
  cursor:pointer;
  transition:transform .15s ease, box-shadow .2s ease, filter .2s ease;
  box-shadow:0 10px 20px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.30);
  text-decoration:none;
  min-height:44px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}
.button:hover{
  transform:translateY(-1px);
  filter:brightness(1.02);
  box-shadow:0 12px 22px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.30);
}
.button:active{
  transform:translateY(0);
  filter:brightness(.99);
  box-shadow:0 6px 12px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.24);
}
.button.secondary{
  background:linear-gradient(180deg, rgba(26,52,84,.98), rgba(10,26,47,.98));
  color:var(--text);
  border:1px solid rgba(255,255,255,.14);
  box-shadow:0 8px 16px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.06);
}

    .tableWrap{
      margin-top:10px;
      overflow-x:auto;
      border-radius:14px;
      border:1px solid rgba(255,214,64,.16);
      background:rgba(4,14,28,.20);
      position:relative;
      z-index:1;
    }
    table{width:100%;border-collapse:collapse;min-width:600px;font-size:13px;}
    th{
      text-align:left;
      color:var(--ink);
      padding:12px 10px;
      background:linear-gradient(180deg, #f2ce55 0%, #d8a91a 100%);
      border-bottom:1px solid rgba(255,214,64,.34);
      font-weight:800;
    }
    td{padding:11px 10px;border-bottom:1px solid rgba(255,255,255,.05);}
    tbody tr:nth-child(odd){background:rgba(255,255,255,.015);}
    tbody tr:hover{background:rgba(243,198,35,.08);}
    .num{text-align:center;width:40px;}
    .team-col{font-weight:700;color:var(--text);}
    .group-row-qualified-1 td{
      background:linear-gradient(180deg, rgba(22,140,86,.34), rgba(10,86,52,.30));
      color:#ecfff4;
    }
    .group-row-qualified-1 td:first-child{
      box-shadow:inset 4px 0 0 #4dff9a;
    }
    .group-row-qualified-2 td{
      background:linear-gradient(180deg, rgba(20,112,74,.28), rgba(10,70,47,.24));
      color:#eafff1;
    }
    .group-row-qualified-2 td:first-child{
      box-shadow:inset 4px 0 0 #7dffb4;
    }
    .group-row-best-third td{
      background:linear-gradient(180deg, rgba(22,116,72,.20), rgba(9,58,39,.18));
      color:#e6ffef;
    }
    .group-row-best-third td:first-child{
      box-shadow:inset 4px 0 0 #aaffcb;
    }
    .group-row-qualified-1:hover td,
    .group-row-qualified-2:hover td,
    .group-row-best-third:hover td{
      filter:brightness(1.04);
    }
    .team-with-flag{display:flex;align-items:center;gap:10px;min-width:0;}
    .team-with-flag.right{justify-content:flex-end;}
    .flag{width:22px;height:16px;object-fit:cover;border-radius:3px;border:1px solid rgba(255,255,255,.18);box-shadow:0 2px 6px rgba(0,0,0,.18);flex:0 0 auto;background:rgba(255,255,255,.08);}
    .flag.small{width:20px;height:14px;}
    .team-label{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    .tableWrap-groups{
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-x:contain;
      scrollbar-width:thin;
      scrollbar-color:rgba(243,198,35,.42) rgba(255,255,255,.06);
    }
    .tableWrap-groups::-webkit-scrollbar{height:8px;}
    .tableWrap-groups::-webkit-scrollbar-track{background:rgba(255,255,255,.05);border-radius:999px;}
    .tableWrap-groups::-webkit-scrollbar-thumb{background:rgba(243,198,35,.42);border-radius:999px;}
    .groupTable{width:100%;border-collapse:separate;border-spacing:0;min-width:600px;font-size:13px;}
    .groupTable th,
    .groupTable td{white-space:nowrap;}
    .groupTable thead th{
      position:sticky;
      top:0;
      z-index:4;
    }
    .ko-team-label{display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden;}
    .ko-team-label .team-label{font-size:12px;}

    .jornada-title{
      margin-top:18px;
      margin-bottom:10px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:1px;
      color:var(--ink);
      font-weight:900;
      padding:6px 10px;
      background:linear-gradient(180deg, #f0cb53 0%, #d5a816 100%);
      border-radius:999px;
      display:inline-block;
      box-shadow:0 10px 18px rgba(0,0,0,.18);
    }
    .fixtureRow{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:12px;
      padding:14px 14px;
      margin-bottom:8px;
      background:linear-gradient(180deg, rgba(7,22,42,.96), rgba(5,17,32,.98));
      border:1px solid rgba(255,214,64,.12);
      border-radius:14px;
      box-shadow:0 12px 22px rgba(0,0,0,.18);
      transition:transform .15s ease, border-color .2s ease, box-shadow .2s ease;
    }
    .fixtureRow:hover{
      transform:translateY(-1px);
      border-color:rgba(255,214,64,.28);
      box-shadow:0 16px 26px rgba(0,0,0,.22);
    }
    .teamName{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
    .teamName.right{text-align:right;}
    .score{display:flex;align-items:center;gap:8px;}
    #fixturesList{
      display:flex;
      flex-direction:column;
      gap:8px;
      padding-bottom:4px;
    }
    .box{
      width:44px;height:38px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,214,64,.22);
      border-radius:12px;
      color:#fff;
      font-size:16px;
      font-weight:800;
      text-align:center;
      outline:none;
      padding:0;
      appearance:textfield;
      -moz-appearance:textfield;
      -webkit-appearance:none;
      transition:border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }
    .box::-webkit-outer-spin-button, .box::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
    .box:focus{border-color:rgba(255,214,64,.72);background:rgba(243,198,35,.08);box-shadow:0 0 0 3px rgba(243,198,35,.12);}

    .koContainer{
      width:100%;
      overflow-x:auto;
      overflow-y:visible;
      background:linear-gradient(180deg, rgba(4,15,29,.96), rgba(3,12,24,.98));
      border:1px solid rgba(255,214,64,.14);
      border-radius:18px;
      position:relative;
      margin-bottom:18px;
      box-shadow:var(--shadow);
      -webkit-overflow-scrolling:touch;
    }
    .ko-bracket-hscroll{
      display:flex;
      flex-direction:column;
      width:max-content;
      min-width:100%;
      box-sizing:border-box;
    }
.ko-bracket-sim-strip{
  display:flex;
  flex-wrap:nowrap;
  gap:8px;
  align-items:center;
  justify-content:flex-start;
  overflow-x:auto;
  overflow-y:hidden;
  padding:9px 10px 9px;
  margin:0 0 10px;
  position:sticky;
  top:var(--bracket-sim-sticky-top);
  z-index:17;
  background:linear-gradient(180deg, rgba(6,20,37,.96), rgba(4,15,29,.98));
  border:1px solid rgba(255,214,64,.12);
  border-radius:15px;
  box-shadow:0 8px 16px rgba(0,0,0,.14);
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;
  scrollbar-color:rgba(243,198,35,.36) rgba(255,255,255,.05);
}
.ko-bracket-sim-strip::-webkit-scrollbar{
  height:7px;
}
.ko-bracket-sim-strip::-webkit-scrollbar-track{
  background:rgba(255,255,255,.05);
  border-radius:999px;
}
.ko-bracket-sim-strip::-webkit-scrollbar-thumb{
  background:rgba(243,198,35,.36);
  border-radius:999px;
}
.ko-bracket-sim-cell{
  width:auto;
  flex:0 0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  gap:4px;
  min-height:auto;
}
.ko-bracket-sim-cell--center{
  width:auto;
  flex:0 0 auto;
  padding-top:0;
}
.ko-bracket-sim-mini-label{
  font-size:9px;
  font-weight:800;
  letter-spacing:.5px;
  text-transform:uppercase;
  color:var(--muted);
  line-height:1.1;
  white-space:nowrap;
}
.ko-round-option{
  min-height:32px;
  padding:5px 9px;
  border:none;
  background:transparent;
  color:#f2f6ff;
  border-radius:9px;
  cursor:pointer;
  font-size:12.5px;
  font-weight:800;
  letter-spacing:.2px;
  text-transform:none;
  transition:transform .12s ease, opacity .15s ease, color .15s ease;
  white-space:nowrap;
  display:inline-flex;
  align-items:center;
  justify-content:flex-start;
  gap:8px;
}
.ko-round-option:hover:not([data-locked="1"]){
  transform:translateY(-1px);
}
.ko-round-option[data-locked="1"]{
  opacity:.5;
  cursor:not-allowed;
}
.ko-round-dot{
  width:15px;
  height:15px;
  border-radius:999px;
  border:1.5px solid rgba(255,255,255,.92);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex:0 0 15px;
}
.ko-round-dot::after{
  content:"";
  width:7px;
  height:7px;
  border-radius:999px;
  background:transparent;
}
.ko-round-option[data-selected="1"]{
  color:#fff2b5;
}
.ko-round-option[data-selected="1"] .ko-round-dot{
  border-color:#ffd966;
}
.ko-round-option[data-selected="1"] .ko-round-dot::after{
  background:#ffd966;
}
.ko-round-grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(92px, 1fr));
  gap:3px 8px;
  flex:1 1 auto;
  min-width:205px;
}
.ko-round-controls{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  width:auto;
  margin:0 auto;
  max-width:100%;
}
.ko-bracket-sim-btn.side{
  flex:0 0 auto;
  min-width:96px;
  min-height:40px;
  border-radius:13px;
  font-size:12px;
}
.bracket{
      position:relative;
      display:flex;
      gap:18px;
      padding:48px 24px;
      min-width:860px;
      min-height:760px;
      box-sizing:border-box;
      background:
        radial-gradient(circle at 15% 20%, rgba(243,198,35,.04), transparent 20%),
        radial-gradient(circle at 85% 10%, rgba(10,55,104,.18), transparent 22%);
    }
    .round{width:var(--koRoundW);display:flex;flex-direction:column;justify-content:space-around;position:relative;z-index:2;}
    .roundTitle{position:absolute;top:-40px;width:100%;text-align:center;color:#ffd96a;font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:800;}
.round > .roundTitle{display:none;}
    .match{
      width:100%;height:var(--koMatchH);
      background:var(--koPanel);
      border:1px solid rgba(255,214,64,.14);
      border-radius:12px;
      display:flex;flex-direction:column;justify-content:center;
      position:relative;
      box-shadow:0 8px 18px rgba(0,0,0,.24);
    }
    .mteam{
      padding:0 10px 0 11px;
      height:50%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-size:13px;
      font-weight:700;
      color:#fff;
    }
    .mteam:first-child{border-bottom:1px solid rgba(255,255,255,.06);}
    .inputs-wrap{display:flex;align-items:center;gap:5px;}
    .ko-box, .ko-pen{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,214,64,.18);
      color:#fff;
      text-align:center;
      border-radius:8px;
      outline:none;
      padding:0;
      appearance:textfield;
      -moz-appearance:textfield;
    }
    .ko-box::-webkit-outer-spin-button,.ko-box::-webkit-inner-spin-button,.ko-pen::-webkit-outer-spin-button,.ko-pen::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
    .ko-box{width:24px;height:22px;font-size:11px;font-weight:800;}
    .ko-box:focus{border-color:rgba(255,214,64,.72);background:rgba(243,198,35,.08);}
    .ko-box:disabled,.ko-pen:disabled{opacity:.42;cursor:not-allowed;background:rgba(255,255,255,.03);}
    .ko-pen{width:20px;height:20px;font-size:10px;color:#ffd96a;border-color:rgba(255,214,64,.3);display:none;}
    .show-pen .ko-pen{display:block;animation:fadeIn .3s;}
    @keyframes fadeIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
    svg.lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
    .center-block{width:188px;display:flex;flex-direction:column;justify-content:center;gap:18px;align-items:center;position:relative;}
    .final-title-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;}
    .champion-name{min-height:24px;font-size:18px;font-weight:900;letter-spacing:.3px;color:#fff3bf;text-align:center;text-shadow:0 4px 18px rgba(0,0,0,.4);}
    .final-lock-message{min-height:18px;margin-top:8px;font-size:13px;font-weight:800;color:#ff6c6c;text-align:center;letter-spacing:.2px;}
    .champion-slot{width:100%;min-height:210px;display:flex;align-items:center;justify-content:center;position:relative;}
    .champion-panel{width:100%;max-width:260px;min-height:190px;border-radius:24px;border:1px solid rgba(255,214,64,.26);background:radial-gradient(circle at top, rgba(243,198,35,.18), rgba(6,18,36,.96) 62%);box-shadow:0 18px 38px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.06);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:18px 16px;position:relative;overflow:hidden;}
    .champion-panel.empty{opacity:.18;filter:saturate(.7);}
    .champion-caption{font-size:15px;font-weight:900;letter-spacing:2px;color:#ffd96a;position:relative;z-index:2;}
    .champion-download-btn{position:relative;z-index:4;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:9px 14px;border-radius:999px;border:1px solid rgba(255,214,64,.72);background:linear-gradient(180deg, #f7d35c 0%, #e7b81f 100%);color:#08264d;font-size:13px;font-weight:900;cursor:pointer;box-shadow:0 10px 18px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.32);transition:transform .15s ease, filter .2s ease;}
    .champion-download-btn:hover{transform:translateY(-1px);filter:brightness(1.03);}
    .champion-download-btn:disabled{opacity:.75;cursor:wait;transform:none;}

function isGroupComplete(groupId) {
  const stats = getGroupStats(groupId);
  return stats.length === 4 && stats.every(team => Number(team.pj) === 3);
}

function areAllGroupsComplete() {
  const groupIds = Object.keys(GROUPS).sort();
  if (!groupIds.length) return false;
  return groupIds.every(groupId => isGroupComplete(groupId));
}

function getQualifiedThirdGroups() {
  if (!areAllGroupsComplete() || !LOAD_STATUS.combos) return new Set();

  const thirds = [];
  Object.keys(GROUPS).sort().forEach(g => {
    const table = getGroupStats(g);
    const row = table[2];
    if (row) thirds.push({ g, stats: row });
  });

  thirds.sort((a,b) =>
  (b.stats.pts - a.stats.pts)
  || (b.stats.dg - a.stats.dg)
  || (b.stats.gf - a.stats.gf)
  || (getTeamFifaRank(a.stats.team) - getTeamFifaRank(b.stats.team))
  || a.g.localeCompare(b.g)
);
  return new Set(thirds.slice(0, 8).map(item => item.g));
}

function getGroupRowClass(groupId, rowIndex) {
  if (!isGroupComplete(groupId)) return '';
  if (rowIndex === 0) return 'group-row-qualified-1';
  if (rowIndex === 1) return 'group-row-qualified-2';
  if (rowIndex === 2 && getQualifiedThirdGroups().has(groupId)) return 'group-row-best-third';
  return '';
}

function getNodeOffsetLeftInsideContainer(target, container) {
  let left = 0;
  let node = target;
  while (node && node !== container) {
    left += node.offsetLeft || 0;
    node = node.offsetParent;
  }
  return left;
}

function getKOTargetScrollLeft(container, target, options = {}) {
  if (!container || !target) return 0;

  const maxLeft = Math.max(0, container.scrollWidth - container.clientWidth);
  const align = options.align || "center";
  const extraOffset = Number(options.extraOffset || 0);

  const targetLeft = getNodeOffsetLeftInsideContainer(target, container);
  const targetWidth = target.offsetWidth || target.clientWidth || 0;

  let nextLeft = targetLeft;

  if (align === "center") {
    nextLeft = targetLeft + (targetWidth / 2) - (container.clientWidth / 2);
  } else if (align === "end") {
    nextLeft = targetLeft + targetWidth - container.clientWidth;
  }

  nextLeft += extraOffset;
  return Math.max(0, Math.min(maxLeft, nextLeft));
}

function scrollToKORef(refId, options = {}) {
  if (!isMobileKOView()) return;
  const container = document.querySelector(".koContainer");
  const target = document.getElementById(refId);
  if (!container || !target) return;

  if (document.activeElement && container.contains(document.activeElement)) {
    document.activeElement.blur();
  }

  const targetLeft = getKOTargetScrollLeft(container, target, options);

  requestAnimationFrame(() => {
    container.scrollTo({ left: targetLeft, behavior: "smooth" });
    setTimeout(() => {
      container.scrollTo({ left: targetLeft, behavior: "auto" });
    }, 320);
  });
}

    ["left16", progress.left16, "R16_R", { align: "center" }],
    ["right16", progress.right16, "R8_L", { align: "center" }],
    ["left8", progress.left8, "R8_R", { align: "center" }],
    ["right8", progress.right8, "R4_L", { align: "center" }],
    ["left4", progress.left4, "R4_R", { align: "center" }],
    ["right4", progress.right4, "RS_L", { align: "center" }],
    ["leftSemi", progress.leftSemi, "RS_R", { align: "center" }],
    ["rightSemi", progress.rightSemi, "centerBlock", { align: "center", extraOffset: 0 }]
  ];

  steps.forEach(([flag, done]) => {
    if (!done) KO_SCROLL_STATE[flag] = false;
  });

  for (const [flag, done, target, options] of steps) {
    if (done && !KO_SCROLL_STATE[flag]) {
      KO_SCROLL_STATE[flag] = true;
      scrollToKORef(target, options || {});
      break;
    }
  }
}

async function loadAllData() {
  document.getElementById("statusPill").textContent = "Cargando...";

  try {
    const [groupsRes, flagsRes] = await Promise.all([
      fetch("grupos.json"),
      fetch("paises-banderas.json")
    ]);

    const groupsJson = groupsRes.ok ? await groupsRes.json() : null;
    const flagsJson = flagsRes.ok ? await flagsRes.json() : {};

    if (groupsJson && groupsJson.grupos) {
      const newG = {};
const newOdds = {};
const newWorldOdds = {};
const newMeta = {};
      

      Object.entries(groupsJson.grupos).forEach(([gName, teams]) => {
        const groupId = cleanStr(gName).toUpperCase();
        newG[groupId] = [];

        (teams || []).forEach(team => {
          const name = cleanStr(team?.pais);
          if (!name) return;

          const fallbackMeta = flagsJson?.[name] || {};
          const code = cleanStr(team?.code || fallbackMeta.code || "").toLowerCase();
          const flag = cleanStr(team?.flag || fallbackMeta.flag || (code ? `flag/${code}.svg` : ""));
          const flagCdn = cleanStr(team?.flagCdn || fallbackMeta.flagCdn || "");
                    const oddsNum = Number(team?.odds_us);
const worldOddsNum = Number(team?.odds_mundial);

newG[groupId].push(name);
newOdds[name] = Number.isFinite(oddsNum) && oddsNum > 0 ? oddsNum : 300000;
newWorldOdds[name] = Number.isFinite(worldOddsNum) && worldOddsNum > 0 ? worldOddsNum : 300000;

const fifaRankNum = Number(team?.fifa_rank);

newMeta[name] = {
  code,
  flag,
  flagCdn,
  grupo: groupId,
  fifa_rank: Number.isFinite(fifaRankNum) && fifaRankNum > 0 ? fifaRankNum : 999
};
        });
      });

      if (Object.keys(newG).length > 0) {
        GROUPS = newG;
TEAM_ODDS_US = newOdds;
TEAM_WORLD_ODDS_US = newWorldOdds;
TEAM_META = newMeta;
LOAD_STATUS.groups = true;
      }
    }
  } catch(e) {
    console.error(e);
  }

  void switchTab("groups");
  renderGroupView();
}

async function ensureComboDataLoaded() {
  if (LOAD_STATUS.combos && COMBO_DATA.length) return true;
  if (COMBO_LOADING_PROMISE) return COMBO_LOADING_PROMISE;

  COMBO_LOADING_PROMISE = fetch('combinaciones.json')
    .then(response => {
      if (!response.ok) throw new Error('No se pudo leer combinaciones.json');
      return response.json();
    })
    .then(data => {
      COMBO_DATA = Array.isArray(data)
        ? data.map(row => ({
            "Cadena": cleanStr(row?.Cadena),
            "1A": cleanStr(row?.["1A"]),
            "1B": cleanStr(row?.["1B"]),
            "1D": cleanStr(row?.["1D"]),
            "1E": cleanStr(row?.["1E"]),
            "1G": cleanStr(row?.["1G"]),
            "1I": cleanStr(row?.["1I"]),
            "1K": cleanStr(row?.["1K"]),
            "1L": cleanStr(row?.["1L"])
          })).filter(item => item.Cadena)
        : [];

      LOAD_STATUS.combos = COMBO_DATA.length > 0;
      LOAD_STATUS.msg = LOAD_STATUS.combos
        ? `✅ JSON Cargado (${COMBO_DATA.length} filas)`
        : "Error leyendo combinaciones.json";

      updateKOTabAvailability();
      if (!document.getElementById('view-groups').hidden) renderGroupView();
      return LOAD_STATUS.combos;
    })
    .catch(error => {
      console.error(error);
      LOAD_STATUS.combos = false;
      LOAD_STATUS.msg = "Error leyendo combinaciones.json";
      updateKOTabAvailability();
      return false;
    })
    .finally(() => {
      COMBO_LOADING_PROMISE = null;
    });

  return COMBO_LOADING_PROMISE;
}

function escapeHtml(str) {
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function shouldUseMobileUiOptimizations() {
  return window.innerWidth <= 768 || isNativeAndroidApp();
}

function getMobileOptimizedFlagPath(src) {
  const clean = String(src || "");
  if (!shouldUseMobileUiOptimizations()) return clean;
  if (!/^flag\//i.test(clean) || !/\.svg(?:\?.*)?$/i.test(clean)) return clean;
  return clean.replace(/\.svg(\?.*)?$/i, '.webp$1');
}

function getTeamMeta(teamName) {
  return TEAM_META[teamName] || {};
}

function getTeamFlagSources(teamName) {
  const meta = getTeamMeta(teamName);
  const originalSrc = meta.flag || meta.flagCdn || "";
  const optimizedSrc = getMobileOptimizedFlagPath(originalSrc);
  const cdnSrc = meta.flagCdn || "";
  const fallback = optimizedSrc !== originalSrc ? originalSrc : (cdnSrc && cdnSrc !== optimizedSrc ? cdnSrc : "");
  return { src: optimizedSrc || originalSrc, fallback };
}

function getTeamFlagSrc(teamName) {
  return getTeamFlagSources(teamName).src;
}

function getTeamFlagFallback(teamName) {
  return getTeamFlagSources(teamName).fallback;
}

function getTeamCode(teamName) {
  const displayCode = TEAM_DISPLAY_CODES_ES[teamName];
  if (displayCode) return displayCode;

  const meta = getTeamMeta(teamName);
  return meta.code ? String(meta.code).toUpperCase() : teamName;
}

function getTeamDisplayName(teamName, labelMode = "full") {
  if (labelMode === "code") return getTeamCode(teamName);
  return teamName;
}

function renderTeamLabel(teamName, options = {}) {
  const {
    wrapperClass = "team-with-flag",
    textClass = "team-label",
    flagClass = "flag",
    right = false,
    labelMode = "full"
  } = options;

  const safeName = escapeHtml(teamName);
  const displayName = getTeamDisplayName(teamName, labelMode);
  const safeDisplay = escapeHtml(displayName);
  const src = getTeamFlagSrc(teamName);
  const fallback = getTeamFlagFallback(teamName);
  const wrapper = `${wrapperClass}${right ? ' right' : ''}`;
  const onerror = fallback ? `this.onerror=null;this.src='${escapeHtml(fallback)}';` : "this.style.display='none'";
  const img = src ? `<img class="${flagClass}" src="${escapeHtml(src)}" alt="${safeName}" loading="lazy" decoding="async" onerror="${onerror}">` : "";

  return `<span class="${wrapper}">${img}<span class="${textClass}" title="${safeName}">${safeDisplay}</span></span>`;
}

function buildConfettiPieces() {
  const palette = ["#ffd966", "#f6c11d", "#fff0a6", "#7ce38b", "#ffffff", "#4dc3ff"];
  return Array.from({ length: 28 }, (_, i) => {
    const left = ((i * 17) % 100) + Math.random() * 3;
    const delay = -(Math.random() * 5.5).toFixed(2);
    const duration = (3.8 + Math.random() * 3.2).toFixed(2);
    const drift = ((Math.random() * 80) - 40).toFixed(0) + 'px';
    const color = palette[i % palette.length];
    const cls = i % 4 === 0 ? 'confetti-piece alt' : 'confetti-piece';
    return `<span class="${cls}" style="left:${left.toFixed(1)}%;background:${color};animation-delay:${delay}s;animation-duration:${duration}s;--drift:${drift};"></span>`;
  }).join('');
}

function slugifyFileName(value) {
  return String(value || 'bracket')
    .normalize('NFD')
    .replace(/[̀-ͯ]/g, '')
    .replace(/[^a-zA-Z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .toLowerCase() || 'bracket';
}

  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx) return null;

  if (SIM_AUDIO_CTX.state === "suspended") {
    SIM_AUDIO_CTX.resume().catch(() => {});
  }
  return SIM_AUDIO_CTX;
}

function playSimTick(multiplier = 1) {
  const ctx = ensureSimAudio();
  if (!ctx) return;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "triangle";
  osc.frequency.setValueAtTime(220 * multiplier, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(120 * multiplier, ctx.currentTime + 0.05);

  gain.gain.setValueAtTime(0.0001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.03, ctx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.06);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.07);
}

function isNativeAndroidApp() {

    if (!bridge || typeof bridge.getPlatform !== 'function') return false;
    const isNative = typeof bridge.isNativePlatform === 'function' ? bridge.isNativePlatform() : true;
    return bridge.getPlatform() === 'android' && !!isNative;
  } catch (_) {

}

async function shareBracketImageFromNative(fileName, dataUrl) {
  const Filesystem = getCapacitorPlugin('Filesystem');
  const Share = getCapacitorPlugin('Share');
  if (!Filesystem || !Share) return false;

  const base64Data = dataUrlToBase64(dataUrl);
  if (!base64Data) return false;

  await Filesystem.writeFile({
    path: fileName,
    data: base64Data,
    directory: 'CACHE'
  });

  const uriResult = await Filesystem.getUri({
    path: fileName,
    directory: 'CACHE'
  });

  await Share.share({
  title: 'Mi predicción del Mundial 2026',
  text: 'Hice mi predicción del Mundial 2026 con esta app. Si quieres crear la tuya, puedes instalarla desde Google Play: https://play.google.com/store/apps/details?id=com.franc.simulacionmundial',
  files: [uriResult.uri],
  dialogTitle: 'Compartir mi predicción'
});

  return true;
}

      return;
    }

    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.decoding = 'async';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error(`No se pudo cargar: ${src}`));
    img.src = src;

    if (img.complete && img.naturalWidth > 0) {
      resolve(img);
    }
  });
}

function shouldRasterizeForExport(src) {
  const absSrc = toAbsoluteAssetUrl(src);
  if (!absSrc || absSrc.startsWith('data:')) return false;

  const sameOrigin = absSrc.startsWith(window.location.origin);
  const isSvg = /\.svg(?:\?.*)?$/i.test(absSrc);
  const isRemote = !sameOrigin;

  return isSvg || isRemote;
}

function getExportScale() {
  if (isNativeAndroidApp()) return 2;
  return Math.min(3, Math.max(2, window.devicePixelRatio || 2));
}

async function rasterizeImageSourceForExport(src) {
  const absSrc = toAbsoluteAssetUrl(src);
  if (!absSrc) return src;
  if (!shouldRasterizeForExport(absSrc)) return absSrc;
  if (EXPORT_SAFE_IMAGE_CACHE.has(absSrc)) return EXPORT_SAFE_IMAGE_CACHE.get(absSrc);

  let safeSrc = absSrc;

  try {
    const response = await fetch(absSrc, { cache: 'force-cache' });
    if (!response.ok) throw new Error(`No se pudo leer ${absSrc}`);

    const blob = await response.blob();
    const objectUrl = URL.createObjectURL(blob);

    try {
      const img = await loadImageElement(objectUrl);
      const canvas = document.createElement('canvas');
      canvas.width = Math.max(1, img.naturalWidth || 1);
      canvas.height = Math.max(1, img.naturalHeight || 1);

      const ctx = canvas.getContext('2d');
      if (!ctx) throw new Error('No se pudo crear canvas');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      safeSrc = canvas.toDataURL('image/png');
    } finally {
      URL.revokeObjectURL(objectUrl);
    }
  } catch (error) {
    console.warn('No se pudo rasterizar la imagen para exportación:', absSrc, error);
    safeSrc = absSrc;
  }

  EXPORT_SAFE_IMAGE_CACHE.set(absSrc, safeSrc);
  return safeSrc;
}
async function prepareBracketImagesForExport(target) {
  if (!target) return new Map();

  const imgs = Array.from(target.querySelectorAll('img[src]'));
  imgs.forEach(img => {
    try { img.loading = 'eager'; } catch (_) {}
  });

  await Promise.all(imgs.map(async img => {
    if (!img || !img.src) return;
    const src = img.currentSrc || img.src;
    try {
      await loadImageElement(src);
    } catch (_) {}
    if (typeof img.decode === 'function') {
      try { await img.decode(); } catch (_) {}
    }
  }));

  const exportSafeMap = new Map();

  await Promise.all(imgs.map(async img => {
    const attrSrc = img.getAttribute('src');
    const src = toAbsoluteAssetUrl(img.currentSrc || img.src || attrSrc || '');
    if (!src) return;

    const safeSrc = await rasterizeImageSourceForExport(src);
    exportSafeMap.set(src, safeSrc);
    if (attrSrc) exportSafeMap.set(attrSrc, safeSrc);
  }));

  return exportSafeMap;
}

async function downloadBracketImage() {
  const target = document.getElementById('bracketCanvas');
  const button = document.getElementById('championDownloadBtn');
  if (!target) return;

  if (typeof window.html2canvas !== 'function') {
    alert('No se pudo cargar la herramienta para exportar la imagen');
    return;
  }

  const originalLabel = button ? button.innerHTML : '';

  if (button) {
    button.disabled = true;
    button.innerHTML = isNativeAndroidApp() ? '📸 Compartiendo...' : '📸 Descargando...';
  }

  try {
    const exportSafeMap = await prepareBracketImagesForExport(target);
    await waitForNextPaint();

    const canvas = await window.html2canvas(target, {
      backgroundColor: '#03162f',
      useCORS: true,
      logging: false,
      removeContainer: true,
      scale: getExportScale(),
      width: target.scrollWidth || target.clientWidth,
      height: target.scrollHeight || target.clientHeight,
      windowWidth: target.scrollWidth || target.clientWidth,
      windowHeight: target.scrollHeight || target.clientHeight,
      scrollX: 0,
      scrollY: 0,
      ignoreElements: (node) => {
        try {
          return !!(node && node.classList && (node.classList.contains("ko-bracket-sim-btn") || node.classList.contains("ko-sim-all-btn")));
        } catch (_) {
          return false;
        }
      },
      onclone: (clonedDoc) => {
        clonedDoc.body.classList.add('export-capture');
        const cloneTarget = clonedDoc.getElementById('bracketCanvas');
        if (!cloneTarget) return;

        cloneTarget.querySelectorAll('img').forEach(img => {
          try { img.loading = 'eager'; } catch (_) {}
          const rawSrc = img.getAttribute('src') || '';
          const absSrc = toAbsoluteAssetUrl(rawSrc);
          const safeSrc = exportSafeMap.get(absSrc) || exportSafeMap.get(rawSrc);
          if (safeSrc) {
            img.setAttribute('src', safeSrc);
            img.removeAttribute('srcset');
          }
        });
      }
    });

    const champion = document.getElementById('championName')?.textContent?.trim() || 'bracket';
    const fileName = `mundial-2026-${slugifyFileName(champion)}.png`;
    const dataUrl = canvas.toDataURL('image/png');

    if (isNativeAndroidApp()) {
      const shared = await shareBracketImageFromNative(fileName, dataUrl);
      if (!shared) {
        throw new Error('No se pudo abrir el panel nativo para compartir la imagen');
      }
    } else {
      const link = document.createElement('a');
      link.download = fileName;
      link.href = dataUrl;
      link.click();
    }
  } catch (error) {
    console.error(error);
    alert(isNativeAndroidApp() ? 'No se pudo compartir la imagen' : 'No se pudo descargar la imagen');
  } finally {
    if (button) {
      button.disabled = false;
      button.innerHTML = originalLabel || (isNativeAndroidApp() ? '📸 Compartir' : '📸 Descargar');
    }
  }
}

function americanToProb(oddsUS) {
  const odds = Number(oddsUS);
  if (!Number.isFinite(odds) || odds === 0) return 0;
  return odds > 0 ? 100 / (odds + 100) : Math.abs(odds) / (Math.abs(odds) + 100);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function getTeamOddsUS(teamName) {
  return TEAM_ODDS_US[teamName] ?? 300000;
}

function getGroupRawProbs(gName) {
  const teams = (GROUPS[gName] || []).filter(Boolean);
  const probs = {};
  let total = 0;

  teams.forEach(team => {
    const p = americanToProb(getTeamOddsUS(team));
    probs[team] = p;
    total += p;
  });

  if (total <= 0) {
    const fallback = teams.length ? (1 / teams.length) : 0;
    teams.forEach(team => {
      probs[team] = fallback;
    });
    return probs;
  }

  teams.forEach(team => {
    probs[team] = probs[team] / total;
  });

  return probs;
}

function getTeamStrength(teamName, gName) {
  const probs = getGroupRawProbs(gName);
  const teams = (GROUPS[gName] || []).filter(Boolean);
  const fallback = teams.length ? (1 / teams.length) : (1 / 4);
  const p = probs[teamName] ?? fallback;
  return Math.log(p);
}

function weightedPick(list) {
  const total = list.reduce((sum, item) => sum + item.peso, 0);
  let r = Math.random() * total;

  for (const item of list) {
    r -= item.peso;
    if (r <= 0) return item;
  }

  return list[list.length - 1];
}

function pickWeightedResult(homeName, awayName, gName) {
  const homeStrength = getTeamStrength(homeName, gName);
  const awayStrength = getTeamStrength(awayName, gName);

  const delta = (homeStrength - awayStrength) * 1.15;

  const pDraw = clamp(0.24 - 0.05 * Math.abs(delta), 0.05, 0.24);
  const pHomeNoDraw = 1 / (1 + Math.exp(-delta));
  const pHome = (1 - pDraw) * pHomeNoDraw;
  const pAway = 1 - pDraw - pHome;

  const roll = Math.random();

  if (roll < pHome) {
    const score = weightedPick(SCORE_BUCKETS.home);
    return { l: score.l, r: score.r };
  }

  if (roll < pHome + pDraw) {
    const score = weightedPick(SCORE_BUCKETS.draw);
    return { l: score.l, r: score.r };
  }

  const score = weightedPick(SCORE_BUCKETS.away);
  return { l: score.l, r: score.r };
}

  if (shouldUseMobileUiOptimizations()) renderGroupTableOnly();

  if (restoreFocusAfter && focus) restoreGroupInputFocus(focus.matchId, focus.side, focus.start, focus.end);

function scheduleGroupRender(focusData = null, delay = 180) {
  if (focusData) PENDING_GROUP_FOCUS = focusData;
  if (GROUP_RENDER_TIMER) clearTimeout(GROUP_RENDER_TIMER);
  GROUP_RENDER_TIMER = setTimeout(() => {
    GROUP_RENDER_TIMER = null;
    runScheduledGroupRefresh(true);
  }, delay);
}

function flushGroupRender(restoreFocusAfter = true) {
  if (!GROUP_RENDER_TIMER) return;
  clearTimeout(GROUP_RENDER_TIMER);
  GROUP_RENDER_TIMER = null;

}

async function simulateCurrentGroup() {
  if (IS_SIMULATING) return;

  clearPendingGroupRender();
  const matches = getGroupMatchPlan(currentGroup);
  if (!matches.length) return;

  IS_SIMULATING = true;

  const btn = document.getElementById("simulate-group-btn");
  const btnAll = document.getElementById("simulate-all-groups-btn");
  const oldLabel = btn ? btn.innerHTML : "";
  const oldAllLabel = btnAll ? btnAll.innerHTML : "";

  try {
    if (!FIXTURES[currentGroup]) FIXTURES[currentGroup] = {};

    if (btn) {
      btn.disabled = true;
      btn.innerHTML = "⏳ Simulando...";
    }
    if (btnAll) btnAll.disabled = true;

    if (btnAll) {
      btnAll.disabled = false;
      btnAll.innerHTML = oldAllLabel || "🎯 Simular grupos A-L";

  }

// LÓGICA GRUPOS
// ===========================================
function buildHeadToHeadMiniTable(gName, teamNames) {
  const selectedTeams = new Set(teamNames);
  const mini = {};

  teamNames.forEach(team => {
    mini[team] = { pts:0, gf:0, gc:0, dg:0 };
  });

  const fx = FIXTURES[gName] || {};
  const matches = getGroupMatchPlan(gName);

  matches.forEach(match => {
    if (!selectedTeams.has(match.homeTeam) || !selectedTeams.has(match.awayTeam)) return;

    const res = fx[match.id];
    if (!res || res.l === "" || res.r === "") return;

    const gl = parseInt(res.l, 10);
    const gr = parseInt(res.r, 10);
    if (!Number.isFinite(gl) || !Number.isFinite(gr)) return;

    const home = mini[match.homeTeam];
    const away = mini[match.awayTeam];
    if (!home || !away) return;

    home.gf += gl;
    home.gc += gr;
    home.dg = home.gf - home.gc;

    away.gf += gr;
    away.gc += gl;
    away.dg = away.gf - away.gc;

    if (gl > gr) {
      home.pts += 3;
    } else if (gl < gr) {
      away.pts += 3;
    } else {
      home.pts += 1;
      away.pts += 1;
    }
  });

  return mini;
}

function getTeamFifaRank(teamName) {
  const meta = getTeamMeta(teamName);
  const rank = Number(meta?.fifa_rank);
  return Number.isFinite(rank) && rank > 0 ? rank : 999;
}

function compareGeneralGroupStats(a, b) {
  return (b.pts - a.pts)
    || (b.dg - a.dg)
    || (b.gf - a.gf)
    || (getTeamFifaRank(a.team) - getTeamFifaRank(b.team))
    || a.team.localeCompare(b.team);
}

function resolveHeadToHeadTie(groupStats, gName) {
  if (groupStats.length <= 1) return [...groupStats];

  const mini = buildHeadToHeadMiniTable(gName, groupStats.map(item => item.team));

  const decorated = groupStats.map(item => ({
    item,
    mini: mini[item.team] || { pts:0, dg:0, gf:0 }
  }));

  decorated.sort((a, b) =>
    (b.mini.pts - a.mini.pts)
    || (b.mini.dg - a.mini.dg)
    || (b.mini.gf - a.mini.gf)
  );

  const resolved = [];

  for (let i = 0; i < decorated.length; ) {
    let j = i + 1;

    while (
      j < decorated.length &&
      decorated[j].mini.pts === decorated[i].mini.pts &&
      decorated[j].mini.dg === decorated[i].mini.dg &&
      decorated[j].mini.gf === decorated[i].mini.gf
    ) {
      j++;
    }

    const tiedSlice = decorated.slice(i, j).map(entry => entry.item);

    if (tiedSlice.length === 1) {
      resolved.push(tiedSlice[0]);
    } else if (tiedSlice.length < groupStats.length) {
      resolved.push(...resolveHeadToHeadTie(tiedSlice, gName));
    } else {
      resolved.push(...tiedSlice.sort(compareGeneralGroupStats));
    }

    i = j;
  }

  return resolved;
}

function sortGroupStatsWithHeadToHead(stats, gName) {
  const byPoints = [...stats].sort(compareGeneralGroupStats);
  const resolved = [];

  for (let i = 0; i < byPoints.length; ) {
    let j = i + 1;

    while (j < byPoints.length && byPoints[j].pts === byPoints[i].pts) {
      j++;
    }

    const tiedGroup = byPoints.slice(i, j);

    if (tiedGroup.length === 1) {
      resolved.push(tiedGroup[0]);
    } else {
      resolved.push(...resolveHeadToHeadTie(tiedGroup, gName));
    }

    i = j;
  }

  return resolved;
}

function getGroupStats(gName) {
  const teams = GROUPS[gName] || ["?","?","?","?"];
  let stats = teams.map(t => ({ team:t, pj:0, g:0, e:0, p:0, gf:0, gc:0, pts:0, dg:0 }));
  const map = {};
  stats.forEach(s => map[s.team] = s);

  const fx = FIXTURES[gName] || {};
  const matches = getGroupMatchPlan(gName);

  matches.forEach(match => {
    const res = fx[match.id];
    if (res && res.l !== "" && res.r !== "" && map[match.homeTeam] && map[match.awayTeam]) {
      const tA = map[match.homeTeam];
      const tB = map[match.awayTeam];
      const gl = parseInt(res.l, 10);
      const gr = parseInt(res.r, 10);

      if (!Number.isFinite(gl) || !Number.isFinite(gr)) return;

      tA.pj++;
      tB.pj++;

      tA.gf += gl;
      tA.gc += gr;
      tA.dg = tA.gf - tA.gc;

      tB.gf += gr;
      tB.gc += gl;
      tB.dg = tB.gf - tB.gc;

      if (gl > gr) {
        tA.pts += 3;
        tA.g++;
        tB.p++;
      } else if (gl < gr) {
        tB.pts += 3;
        tB.g++;
        tA.p++;
      } else {
        tA.pts++;
        tB.pts++;
        tA.e++;
        tB.e++;
      }
    }
  });

  stats = sortGroupStatsWithHeadToHead(stats, gName);
  return stats;
}

function getWinner(scoresObj, id, home, away) {
  if (id === "F_1" && KO_FINAL_LOCKED) return null;

  if (SIMPLE_MODE) {
    const picked = SIMPLE_KO_WINNERS[id];
    if (picked === "home") return home;
    if (picked === "away") return away;
  }

  const s = scoresObj[id];
  if (!s || s.h === "" || s.a === "") return null;
  const h = parseInt(s.h), a = parseInt(s.a);
  if (h > a) return home;
  if (a > h) return away;
  if (s.hp !== "" && s.ap !== "") {
    if (parseInt(s.hp) > parseInt(s.ap)) return home;
    if (parseInt(s.ap) > parseInt(s.hp)) return away;
  }
  return null;
}

function createMatchDiv(id, teamA, teamB, scoresObj, onInputFnName, options = {}) {
  const s = scoresObj[id] || { h:"", a:"", hp:"", ap:"" };

function restoreFocus(matchId, key) {
  const matchEl =
    document.getElementById("m_" + matchId) ||
    document.getElementById(matchId) ||
    document.querySelector(`[data-match-id="${matchId}"]`);

  if (matchEl) {

    else if (key === "hp") idx = 1;
    else if (key === "a") idx = 2;
    else if (key === "ap") idx = 3;
    if (idx >= 0 && inputs[idx]) inputs[idx].focus();
  }

function getKORoundKeyFromMatchId(id) {
  if (/^(L16_|R16_)/.test(id)) return "r16";
  if (/^(L8_|R8_)/.test(id)) return "r8";
  if (/^(L4_|R4_)/.test(id)) return "r4";
  if (/^(LS_1|RS_1)$/.test(id)) return "sf";
  if (id === "T3_1") return "third";
  if (id === "F_1") return "final";
  return null;
}

function clearKOMatchState(id) {
  delete KO_SCORES[id];
  delete SIMPLE_KO_WINNERS[id];
}

function clearKODownstream(roundKey) {
  if (!roundKey || !KO_SIM_DOWNSTREAM[roundKey]) return;
  KO_SIM_DOWNSTREAM[roundKey].forEach(nextRound => {
    (KO_SIM_ROUND_IDS[nextRound] || []).forEach(clearKOMatchState);
  });
}

function clearKOSegment(segmentKey) {
  const extra = KO_SEGMENT_CLEAR[segmentKey];
  if (extra && extra.length) extra.forEach(clearKOMatchState);
  if (segmentKey === "third") clearKOMatchState("T3_1");
  if (segmentKey === "final") clearKOMatchState("F_1");
}

function isBracketSegmentReady(segmentKey) {
  if (segmentKey === "final" && KO_FINAL_LOCKED) return false;
  const ids = KO_SIM_SEGMENT_IDS[segmentKey];
  if (!ids || !ids.length) return false;
  return ids.every(id => {
    const t = getKOMatchTeamsFromDom(id);
    return isRealKOTeamsPair(t.home, t.away);
  });
}

function getKOProgress() {
  const pairReady = (id) => {
    const t = getKOMatchTeamsFromDom(id);
    return isRealKOTeamsPair(t.home, t.away);
  };

  const finalTeams = getKOMatchTeamsFromDom("F_1");

  return {
    left16: ["L8_1", "L8_2", "L8_3", "L8_4"].every(pairReady),
    right16: ["R8_1", "R8_2", "R8_3", "R8_4"].every(pairReady),
    left8: ["L4_1", "L4_2"].every(pairReady),
    right8: ["R4_1", "R4_2"].every(pairReady),
    left4: pairReady("LS_1"),
    right4: pairReady("RS_1"),
    leftSemi: !!(finalTeams.home && finalTeams.home !== "—"),
    rightSemi: !!(finalTeams.away && finalTeams.away !== "—")
  };
}

function getKOTeamOddsUS(teamName) {
  return TEAM_WORLD_ODDS_US[teamName] ?? 300000;
}

function getKOAllRawProbs() {
  const teams = Object.keys(TEAM_WORLD_ODDS_US);
  const probs = {};
  let total = 0;

  teams.forEach(team => {
    const p = americanToProb(getKOTeamOddsUS(team));
    probs[team] = p;
    total += p;
  });

  if (total <= 0) {
    const fallback = teams.length ? (1 / teams.length) : 0;
    teams.forEach(team => probs[team] = fallback);
    return probs;
  }

  teams.forEach(team => {
    probs[team] = probs[team] / total;
  });

  return probs;
}

function getKOTeamStrength(teamName) {
  const probs = getKOAllRawProbs();
  const teams = Object.keys(TEAM_WORLD_ODDS_US);
  const fallback = teams.length ? (1 / teams.length) : (1 / 48);
  const p = probs[teamName] ?? fallback;
  return Math.log(p);
}

function getKODelta(homeName, awayName) {
  return (getKOTeamStrength(homeName) - getKOTeamStrength(awayName)) * 1.1;
}

function getKOMatchTeamsFromDom(id) {
  const matchEl =
    document.getElementById(`m_${id}`) ||
    document.getElementById(id) ||
    document.querySelector(`[data-match-id="${id}"]`) ||
    (id === "F_1" ? document.getElementById("match_F") : null) ||
    (id === "T3_1" ? document.getElementById("match_3rd") : null);

  if (!matchEl) return { home: "", away: "" };

  const labels = matchEl.querySelectorAll(".team-label");
  const home = (labels[0]?.getAttribute("title") || labels[0]?.textContent || "").trim();
  const away = (labels[1]?.getAttribute("title") || labels[1]?.textContent || "").trim();

  return { home, away };
}

function isRealKOTeamsPair(home, away) {
  return !!home && !!away && home !== "—" && away !== "—";
}

function pickMatchOutcomeFromDelta(delta, drawBase = 0.26, drawMin = 0.10, drawMax = 0.28) {
  const pDraw = clamp(drawBase - 0.04 * Math.abs(delta), drawMin, drawMax);
  const pHomeNoDraw = 1 / (1 + Math.exp(-delta));
  const pHome = (1 - pDraw) * pHomeNoDraw;
  const pAway = 1 - pDraw - pHome;

  const roll = Math.random();
  if (roll < pHome) return "home";
  if (roll < pHome + pDraw) return "draw";
  return "away";
}

function simulatePenaltyWinnerSide(homeName, awayName) {
  const delta = getKODelta(homeName, awayName) * 0.35;
  const pHome = 1 / (1 + Math.exp(-delta));
  return Math.random() < pHome ? "home" : "away";
}

function simulateKnockoutMatchDetailed(homeName, awayName) {
  const delta = getKODelta(homeName, awayName);

  const outcome90 = pickMatchOutcomeFromDelta(delta, 0.26, 0.11, 0.28);
  const score90 = weightedPick(KO_SCORE_BUCKETS_90[outcome90 === "home" ? "home" : outcome90 === "away" ? "away" : "draw"]);

  let totalH = score90.l;
  let totalA = score90.r;

  if (outcome90 !== "draw") {
    return {
      h: String(totalH),
      a: String(totalA),
      hp: "",
      ap: "",
      via: "90"
    };
  }

  const deltaET = delta * 0.55;
  const outcomeET = pickMatchOutcomeFromDelta(deltaET, 0.72, 0.55, 0.78);
  const extraScore = weightedPick(KO_SCORE_BUCKETS_ET[outcomeET === "home" ? "home" : outcomeET === "away" ? "away" : "draw"]);

  totalH += extraScore.l;
  totalA += extraScore.r;

  if (outcomeET !== "draw") {
    return {
      h: String(totalH),
      a: String(totalA),
      hp: "",
      ap: "",
      via: "AET"
    };
  }

  const penSide = simulatePenaltyWinnerSide(homeName, awayName);
  const pens = weightedPick(KO_PEN_BUCKETS[penSide]);

  return {
    h: String(totalH),
    a: String(totalA),
    hp: String(pens.h),
    ap: String(pens.a),
    via: "PENS"
  };
}

function simulateSimpleKOWinnerSide(homeName, awayName) {
  const delta = getKODelta(homeName, awayName) * 0.9;
  const pHome = 1 / (1 + Math.exp(-delta));
  return Math.random() < pHome ? "home" : "away";
}

function applySimulatedKOMatch(id, homeName, awayName) {
  if (!isRealKOTeamsPair(homeName, awayName)) return;

  if (SIMPLE_MODE) {
    delete KO_SCORES[id];
    SIMPLE_KO_WINNERS[id] = simulateSimpleKOWinnerSide(homeName, awayName);
    return;
  }

  delete SIMPLE_KO_WINNERS[id];
  const result = simulateKnockoutMatchDetailed(homeName, awayName);
  KO_SCORES[id] = {
    h: result.h,
    a: result.a,
    hp: result.hp,
    ap: result.ap
  };
}

function simulateKORoundInternal(roundKey) {
  const ids = KO_SIM_ROUND_IDS[roundKey] || [];
  ids.forEach(id => {
    const teams = getKOMatchTeamsFromDom(id);
    applySimulatedKOMatch(id, teams.home, teams.away);
  });
}

function isRoundReadyForSimulation(roundKey, progress) {
  if (roundKey === "r16") {
    return KO_SIM_ROUND_IDS.r16.every(id => {
      const teams = getKOMatchTeamsFromDom(id);
      return isRealKOTeamsPair(teams.home, teams.away);
    });
  }
  if (roundKey === "r8") return !!(progress.left16 && progress.right16);
  if (roundKey === "r4") return !!(progress.left8 && progress.right8);
  if (roundKey === "sf") return !!(progress.left4 && progress.right4);
  if (roundKey === "final") return !!(progress.leftSemi && progress.rightSemi);
  return false;
}

window.simKOSegment = async (segmentKey) => {
  if (IS_SIMULATING || !KO_SIM_SEGMENT_IDS[segmentKey]) return;
  if (!isBracketSegmentReady(segmentKey)) return;

  KO_SUPPRESS_AUTO_SCROLL_UNTIL_MANUAL = true;
  IS_SIMULATING = true;

  try {
    clearKOSegment(segmentKey);
    renderKO();

    const ids = KO_SIM_SEGMENT_IDS[segmentKey];
    const steps = getSimSteps("ko");
    const title = `Simulando ${getSegmentVisualLabel(segmentKey)}...`;

    for (let step = 1; step <= steps; step++) {
      ids.forEach(id => {
        const teams = getKOMatchTeamsFromDom(id);
        if (!isRealKOTeamsPair(teams.home, teams.away)) return;

        if (SIMPLE_MODE) {
          SIMPLE_KO_WINNERS[id] = Math.random() < 0.5 ? "home" : "away";
        } else {
          const h = Math.floor(Math.random() * 3);
          const a = Math.floor(Math.random() * 3);
          KO_SCORES[id] = {
            h: String(h),
            a: String(a),
            hp: h === a ? String(3 + Math.floor(Math.random() * 3)) : "",
            ap: h === a ? String(2 + Math.floor(Math.random() * 3)) : ""
          };
          if (h === a && KO_SCORES[id].hp === KO_SCORES[id].ap) {
            KO_SCORES[id].ap = String(Number(KO_SCORES[id].ap) - 1);
          }
        }
      });

      renderKO();
      setSimHud(title, step / steps);
      playSimTick(1 + (step / steps) * 0.45);
      await sleep(step < steps ? 40 : 70);
    }

    ids.forEach(id => {
      const teams = getKOMatchTeamsFromDom(id);
      applySimulatedKOMatch(id, teams.home, teams.away);
    });

    renderKO();
  } finally {
    hideSimHud();
    IS_SIMULATING = false;
    renderKO();
  }
};

window.simKORound = async (roundKey) => {
  if (IS_SIMULATING) return;

  const progress = getKOProgress();
  if (!isRoundReadyForSimulation(roundKey, progress)) return;

  KO_SUPPRESS_AUTO_SCROLL_UNTIL_MANUAL = true;
  IS_SIMULATING = true;

  try {
    clearKODownstream(roundKey);
    renderKO();

    const ids = getPreviewRoundIds(roundKey);
    const steps = getSimSteps("ko");
    const title = `Simulando ${getRoundVisualLabel(roundKey)}...`;

    for (let step = 1; step <= steps; step++) {
      ids.forEach(id => {
        const teams = getKOMatchTeamsFromDom(id);
        if (!isRealKOTeamsPair(teams.home, teams.away)) return;

        if (SIMPLE_MODE) {
          SIMPLE_KO_WINNERS[id] = Math.random() < 0.5 ? "home" : "away";
        } else {
          const h = Math.floor(Math.random() * 3);
          const a = Math.floor(Math.random() * 3);
          KO_SCORES[id] = {
            h: String(h),
            a: String(a),
            hp: h === a ? String(3 + Math.floor(Math.random() * 3)) : "",
            ap: h === a ? String(2 + Math.floor(Math.random() * 3)) : ""
          };
          if (h === a && KO_SCORES[id].hp === KO_SCORES[id].ap) {
            KO_SCORES[id].ap = String(Number(KO_SCORES[id].ap) - 1);
          }
        }
      });

      renderKO();
      setSimHud(title, step / steps);
      playSimTick(1 + (step / steps) * 0.45);
      await sleep(step < steps ? 40 : 70);
    }

    if (roundKey === "final") {
      simulateKORoundInternal("third");
      simulateKORoundInternal("final");
    } else {
      simulateKORoundInternal(roundKey);
    }

    const nextRound = getNextKORound(roundKey);
    if (nextRound) KO_SELECTED_ROUND = nextRound;

    renderKO();
  } finally {
    hideSimHud();
    IS_SIMULATING = false;
    renderKO();
  }
};

function renderKO() {
  let thirds = [];
  Object.keys(GROUPS).sort().forEach(g => {
    const table = getGroupStats(g);
    const row = table[2] || { team:`3ro ${g}`, pj:0, pts:0, dg:0, gf:0 };
    thirds.push({ g: g, stats: row });
  });
  thirds.sort((a,b) =>
  (b.stats.pts - a.stats.pts)
  || (b.stats.dg - a.stats.dg)
  || (b.stats.gf - a.stats.gf)
  || (getTeamFifaRank(a.stats.team) - getTeamFifaRank(b.stats.team))
  || a.g.localeCompare(b.g)
);
  const eliminated = thirds.slice(8).map(x => x.g).sort().join("");
  const comboRow = COMBO_DATA.find(r => r["Cadena"] === eliminated);
  const getPosName = (g, pos) => {
    const stats = getGroupStats(g);
    const t = stats[pos-1];
    if(!t) return `${pos}${g}`;
    return (t.pj === 3) ? t.team : `${pos}${g}`;
  };

  const getThirdName = (key) => { 
  if(!comboRow) return "3ro";
  const val = comboRow[key]; 
  if(!val) return "err";
  const gSrc = cleanStr(val).replace(/\d/,""); 
  const stats = getGroupStats(gSrc);
  const t = stats[2]; 
  if(!t) return val;
  return (t.pj === 3) ? t.team : val; 
};

const activeKOSource = getActiveKOSource();

  let winners16 = {};

    const id = `${prefix}16_${i+1}`; 
    const home = m.a.t === "pos" ? getPosName(m.a.g, m.a.p) : getThirdName(m.a.k);
    const away = m.b.t === "pos" ? getPosName(m.b.g, m.b.p) : getThirdName(m.b.k);
    el.innerHTML += createMatchDiv(id, home, away, activeKOSource, activeKOInputFn);
    const w = getWinner(activeKOSource, id, home, away);
    if (w) winners16[id] = w;
  });
};

};

processRound("L16", "L8", 4, "R8_L", "Octavos", winners16, winners8_L);

document.getElementById("match_F").outerHTML =

document.getElementById("match_3rd").outerHTML =

  };

function drawLines(){
  const svg = document.getElementById("svgLines");
  const cvs = document.getElementById("bracketCanvas");
  const r = cvs.getBoundingClientRect();
  svg.setAttribute("viewBox", `0 0 ${r.width} ${r.height}`);
  svg.innerHTML = ""; 
  const path = (x1,y1,x2,y2) => {
    const p = document.createElementNS("http://www.w3.org/2000/svg","path");
    const mx = x1 + (x2-x1)/2;
    p.setAttribute("d", `M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2},${y2}`);
    p.setAttribute("stroke","rgba(255,255,255,0.15)"); p.setAttribute("stroke-width","2"); p.setAttribute("fill","none");
    svg.appendChild(p);
  };
  const connect = (idFrom, idTo, side) => {
    const f = document.getElementById(idFrom).querySelectorAll(".match");
    const t = document.getElementById(idTo).querySelectorAll(".match");
    f.forEach((m, i) => {
      const rf = m.getBoundingClientRect();
      const rt = t[Math.floor(i/2)] ? t[Math.floor(i/2)].getBoundingClientRect() : rf;
      const x1 = (side==="L") ? rf.right - r.left : rf.left - r.left;
      const x2 = (side==="L") ? rt.left - r.left : rt.right - r.left;
      path(x1, rf.top-r.top+32, x2, rt.top-r.top+32);
    });
  };
  connect("R16_L","R8_L","L"); connect("R8_L","R4_L","L"); connect("R4_L","RS_L","L");
  connect("R16_R","R8_R","R"); connect("R8_R","R4_R","R"); connect("R4_R","RS_R","R");
  const semiL = document.getElementById("RS_L").querySelector(".match").getBoundingClientRect();
  const semiR = document.getElementById("RS_R").querySelector(".match").getBoundingClientRect();
  const final = document.getElementById("match_F").getBoundingClientRect();
  path(semiL.right - r.left, semiL.top - r.top + 32, final.left - r.left, final.top - r.top + 40);
  path(semiR.left - r.left, semiR.top - r.top + 32, final.right - r.left, final.top - r.top + 40);
}

// EVENTOS
window.setGroup = (g) => { clearPendingGroupRender(); currentGroup = g; renderGroupView(); };
window.validateInput = (el, id, side) => {
  if (el.value !== '' && Number(el.value) < 0) el.value = 0;
  if(!FIXTURES[currentGroup]) FIXTURES[currentGroup] = {};
  if(!FIXTURES[currentGroup][id]) FIXTURES[currentGroup][id] = {l:"", r:""};
  FIXTURES[currentGroup][id][side] = el.value;

  let start = null;
  let end = null;
  try {
    start = typeof el.selectionStart === 'number' ? el.selectionStart : null;
    end = typeof el.selectionEnd === 'number' ? el.selectionEnd : start;
  } catch (error) {}

  scheduleGroupRender({ matchId: id, side, start, end });
};

window.updKO = (id, key, val) => {
  if (id === "F_1" && KO_FINAL_LOCKED) return;

  KO_SUPPRESS_AUTO_SCROLL_UNTIL_MANUAL = false;

  const y = window.scrollY;
  const roundKey = getKORoundKeyFromMatchId(id);

  if (!KO_SCORES[id]) KO_SCORES[id] = { h:"", a:"", hp:"", ap:"" };

  renderKO();
  window.scrollTo(0, y);

  if (!SIMPLE_MODE) restoreFocus(id, key);
};

window.pickSimpleKO = (id, side) => {
  if (id === "F_1" && KO_FINAL_LOCKED) return;

  KO_SUPPRESS_AUTO_SCROLL_UNTIL_MANUAL = false;

  const y = window.scrollY;
  const roundKey = getKORoundKeyFromMatchId(id);

  if (SIMPLE_KO_WINNERS[id] === side) delete SIMPLE_KO_WINNERS[id];
  else SIMPLE_KO_WINNERS[id] = side;

  renderKO();

};

document.getElementById("tab-ko").setAttribute("aria-selected","true");

renderKO();
